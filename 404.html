  <!-- Critical CSS (inline for fast first paint) -->
  <style>
    /* Critical CSS - App Shell */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: transparent;
      color: var(--text-primary);
      transition: color 0.3s ease;
    }
    #app {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }
    /* ============================================
       LOADING SCREEN CONTAINER
       ============================================ */
    .app-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      opacity: 1;
      transition: opacity 0.4s ease-out, visibility 0.4s ease-out;
    }

    .app-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Loading ceremony: neural network converges before fade */
    .app-loading.resolving .neural-network {
      animation: neuralConverge 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .app-loading.resolving .loading-logo {
      animation: logoResolve 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
    }

    .app-loading.resolving .loading-status,
    .app-loading.resolving .loading-facts {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    @keyframes neuralConverge {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
      60% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }

    @keyframes logoResolve {
      0% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(90, 139, 255, 0.7)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 40px rgba(90, 139, 255, 0.9)) drop-shadow(0 0 60px rgba(130, 255, 220, 0.5)); }
      100% { transform: scale(0.5); opacity: 0; filter: drop-shadow(0 0 0px transparent); }
    }

    .loading-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }

    /* ============================================
       NEURAL NETWORK CONTAINER
       ============================================ */
    .neural-network {
      position: absolute;
      width: 280px;
      height: 280px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.9;
      pointer-events: none;
    }

    .neural-svg {
      width: 100%;
      height: 100%;
    }

    /* ============================================
       CONNECTION LINES
       ============================================ */
    .neural-line {
      stroke: rgba(90, 139, 255, 0.3);
      stroke-width: 1;
      animation: line-pulse 3s ease-in-out infinite;
    }

    .nl-delay-1 { animation-delay: 0.3s; }
    .nl-delay-2 { animation-delay: 0.6s; }
    .nl-delay-3 { animation-delay: 0.9s; }
    .nl-delay-4 { animation-delay: 1.2s; }
    .nl-delay-5 { animation-delay: 1.5s; }

    @keyframes line-pulse {
      0%, 100% { stroke: rgba(90, 139, 255, 0.2); stroke-width: 1; }
      50% { stroke: rgba(90, 139, 255, 0.5); stroke-width: 1.5; }
    }

    /* ============================================
       NEURAL NODES
       ============================================ */
    .neural-node {
      fill: #5a8bff;
      filter: drop-shadow(0 0 4px rgba(90, 139, 255, 0.8));
      animation: node-pulse 2s ease-in-out infinite;
      will-change: opacity, filter;
    }

    .node-center {
      fill: #82ffdc;
      filter: drop-shadow(0 0 8px rgba(130, 255, 220, 0.9));
      animation: center-pulse 2s ease-in-out infinite;
      will-change: opacity, filter;
    }

    .node-delay-1 { animation-delay: 0.2s; }
    .node-delay-2 { animation-delay: 0.4s; }
    .node-delay-3 { animation-delay: 0.6s; }
    .node-delay-4 { animation-delay: 0.8s; }
    .node-delay-5 { animation-delay: 1s; }
    .node-delay-6 { animation-delay: 1.2s; }

    @keyframes node-pulse {
      0%, 100% {
        opacity: 0.6;
        filter: drop-shadow(0 0 3px rgba(90, 139, 255, 0.5));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 0 8px rgba(90, 139, 255, 1));
      }
    }

    @keyframes center-pulse {
      0%, 100% {
        opacity: 0.8;
        filter: drop-shadow(0 0 6px rgba(130, 255, 220, 0.6));
      }
      50% {
        opacity: 1;
        filter: drop-shadow(0 0 15px rgba(130, 255, 220, 1));
      }
    }

    /* ============================================
       DATA PULSES (traveling particles)
       ============================================ */
    .data-pulse {
      fill: #82ffdc;
      filter: drop-shadow(0 0 6px rgba(130, 255, 220, 0.9));
      opacity: 0;
      animation: pulse-fade 1.5s ease-in-out infinite;
    }

    .dp-delay-1 { animation-delay: 0.2s; animation-duration: 1.8s; }
    .dp-delay-2 { animation-delay: 0.5s; animation-duration: 2s; }
    .dp-delay-3 { animation-delay: 0.3s; animation-duration: 1.6s; }
    .dp-delay-4 { animation-delay: 0.7s; animation-duration: 2.2s; }
    .dp-delay-5 { animation-delay: 0.4s; animation-duration: 1.9s; }

    @keyframes pulse-fade {
      0% { opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ============================================
       LOGO
       ============================================ */
    .loading-logo {
      width: 80px;
      height: 80px;
      aspect-ratio: 1;
      position: relative;
      z-index: 1;
      animation: logo-glow 3s ease-in-out infinite;
      will-change: transform, filter;
    }

    @keyframes logo-glow {
      0%, 100% {
        filter: drop-shadow(0 0 10px rgba(90, 139, 255, 0.4)) drop-shadow(0 0 20px rgba(130, 255, 220, 0.2));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 20px rgba(90, 139, 255, 0.7)) drop-shadow(0 0 40px rgba(130, 255, 220, 0.4));
        transform: scale(1.03);
      }
    }

    /* ============================================
       STATUS TEXT
       ============================================ */
    .loading-status {
      margin: 0;
      color: rgba(231, 231, 234, 0.7);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
    }

    /* ============================================
       LOADING FACTS CAROUSEL
       ============================================ */
    .loading-facts {
      position: absolute;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      max-width: 90vw;
      text-align: center;
      z-index: 1;
    }

    .loading-fact {
      margin: 0;
      color: rgba(231, 231, 234, 0.6);
      font-family: "DM Sans", "Segoe UI", sans-serif;
      font-size: 0.85rem;
      line-height: 1.5;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    .loading-fact.visible {
      opacity: 1;
    }

    /* ============================================
       LIGHT THEME OVERRIDES
       ============================================ */
    [data-theme="light"] .neural-line,
    .is-light .neural-line {
      stroke: rgba(59, 130, 246, 0.25);
    }

    [data-theme="light"] .neural-node,
    .is-light .neural-node {
      fill: #3b82f6;
      filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.6));
    }

    [data-theme="light"] .node-center,
    .is-light .node-center {
      fill: #10b981;
      filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.7));
    }

    [data-theme="light"] .data-pulse,
    .is-light .data-pulse {
      fill: #10b981;
      filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.7));
    }

    [data-theme="light"] .loading-status,
    .is-light .loading-status {
      color: rgba(31, 32, 48, 0.7);
    }

    [data-theme="light"] .loading-fact,
    .is-light .loading-fact {
      color: rgba(31, 32, 48, 0.6);
    }

    [data-theme="light"] .loading-logo,
    .is-light .loading-logo {
      filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)) drop-shadow(0 0 16px rgba(16, 185, 129, 0.15));
    }

    /* ============================================
       ACCESSIBILITY - Reduced Motion
       ============================================ */
    @media (prefers-reduced-motion: reduce) {
      .loading-logo,
      .neural-node,
      .neural-line,
      .data-pulse,
      .loading-fact {
        animation: none;
        transition: none;
      }
      .neural-node {
        opacity: 1;
      }
      .data-pulse {
        opacity: 0;
      }
      .loading-logo {
        filter: drop-shadow(0 0 10px rgba(90, 139, 255, 0.4));
        transform: none;
      }
      .loading-fact {
        opacity: 1;
      }
    }
    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 0;
      padding: 8px 16px;
      background: var(--accent-primary);
      color: white;
      z-index: 10000;
      text-decoration: none;
    }
    .skip-link:focus { top: 0; }
  </style>

  <!-- Early Config Loading - CRITICAL for hosted mode detection -->
  <!-- Loads runtime-config.json asynchronously, app waits for __MIXX_CONFIG_READY__ -->
  <!-- Config is protected in closure to prevent overwriting by later scripts -->
  <script>
    (function() {
      // Protected config storage - cannot be overwritten by later scripts
      var _loadedConfig = null;

      // Create a promise that resolves with the actual config object
      // App should await this and use the resolved value
      window.__MIXX_CONFIG_READY__ = (async function() {
        try {
          // Try runtime-config.json first (hosted mode uses this)
          const response = await fetch('./runtime-config.json');
          if (response.ok) {
            _loadedConfig = await response.json();
            window.__MIXX_CONFIG__ = _loadedConfig;
            console.log('[Boot] Loaded runtime-config.json, mode:', _loadedConfig.mode, 'appSlug:', _loadedConfig.appSlug);
            return _loadedConfig;
          }
        } catch (e) {
          // runtime-config.json not found, try config.json
        }

        try {
          // Fall back to config.json
          const response = await fetch('./config.json');
          if (response.ok) {
            _loadedConfig = await response.json();
            window.__MIXX_CONFIG__ = _loadedConfig;
            console.log('[Boot] Loaded config.json, mode:', _loadedConfig.mode);
            return _loadedConfig;
          }
        } catch (e2) {
          // config.json not found either
        }

        console.log('[Boot] No config files found, using defaults');
        _loadedConfig = {};
        return _loadedConfig;
      })();

      // Protected getter - always returns the loaded config even if window.__MIXX_CONFIG__ was overwritten
      window.__MIXX_GET_CONFIG__ = function() {
        return _loadedConfig;
      };
    })();
  </script>

  <!-- Loading Facts Carousel Script -->
  <script>
    // Loading screen facts carousel
    (function() {
      const facts = [
        // Spatial Computing & Tech
        "Spatial memory helps us remember 65% more information than text alone.",
        "The human brain processes visual information 60,000x faster than text.",
        "AR/VR training can improve learning retention by up to 75%.",
        "3D visualization reduces design errors by up to 40% in architecture.",
        "Spatial computing is projected to be a $280B industry by 2030.",
        "Humans can remember locations better than lists, thanks to the hippocampus.",
        "Interactive 3D content increases engagement by 40% over static media.",
        "The first VR headset was invented in 1968 by Ivan Sutherland.",
        "Spatial audio can help locate sounds within 1-2 degrees of accuracy.",
        "Digital twins are transforming how we design and maintain infrastructure.",
        // Construction Communication & Inefficiency
        "Almost half of all rework on U.S. construction sites is caused by poor communication and bad project data.",
        "Poor communication in construction costs the U.S. sector about $17 billion per year in inefficiencies.",
        "Workers spend over 35% of their week on non-productive tasks like searching for information and resolving conflicts.",
        "Globally, poor communication and bad data drive around $280 billion in construction rework costs.",
        "In some countries, up to 20% of project costs go to fixing mistakes from miscommunication.",
        // GPS & Spatial Positioning
        "GPS precision relies on timing measurements accurate to about 100 nanoseconds — billionths of a second.",
        "At least 4 satellites are needed to compute a full 3D position fix with GPS.",
        // Spatial Data & Urban Intelligence
        "Mobile positioning data reveals real human movement patterns for urban planning and disaster response.",
        // Spatial Computing Research
        "Spatial computing processes data across space and time, enabling context-aware decisions for navigation and robotics."
      ];

      // Fisher-Yates shuffle for random order each load
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      const shuffledFacts = shuffle([...facts]);
      let currentIndex = 0;
      const factEl = document.getElementById('loading-fact');
      if (!factEl) return;

      function showFact() {
        factEl.classList.remove('visible');
        setTimeout(() => {
          factEl.textContent = shuffledFacts[currentIndex];
          factEl.classList.add('visible');
          currentIndex = (currentIndex + 1) % shuffledFacts.length;
        }, 500);
      }

      // Show first fact immediately
      showFact();
      // Rotate every 3 seconds — but honor prefers-reduced-motion
      const reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (!reducedMotion) {
        window.__mixxFactsInterval = setInterval(showFact, 3000);
      }
    })();
  </script>

  <!-- Export controls bridge: keeps static/generated packages usable even if bundled handlers miss landing controls. -->
  <script data-mixx-export-controls-bridge>
    (function() {
      var THEME_KEY = 'mixx-theme';

      function visibleButtons() {
        return Array.prototype.slice.call(document.querySelectorAll('button'));
      }

      function buttonText(button) {
        return (button && button.textContent || '').trim();
      }

      function applyTheme(nextTheme) {
        var theme = nextTheme === 'dark' ? 'dark' : 'light';
        try { localStorage.setItem(THEME_KEY, theme); } catch (e) { /* ignore storage failures */ }
        document.documentElement.setAttribute('data-theme', theme);
        document.body.classList.toggle('is-light', theme === 'light');
        document.body.classList.toggle('is-dark', theme === 'dark');
        visibleButtons().forEach(function(button) {

  <!-- Export Info/Media bridge: static packages must surface Control Panel Info + Media tab data on the landing page. -->
  <script data-mixx-export-info-media-bridge>
    (function() {
      var rendered = false;

      function isLandingPath() {
        var path = window.location.pathname || '/';
        return !/(?:^|\/)app\/?$/.test(path);
      }

      function assetUrl(path) {
        var base = document.querySelector('link[rel="manifest"]');
        var href = base && base.href ? base.href.replace(/manifest\.json(?:\?.*)?$/, '') : document.baseURI;
        return new URL(String(path || '').replace(/^\.\//, ''), href).href;
      }

      async function loadProjectBundle() {
        var config = null;
        try {
          if (window.__MIXX_CONFIG_READY__) config = await window.__MIXX_CONFIG_READY__;
          if (!config && window.__MIXX_GET_CONFIG__) config = window.__MIXX_GET_CONFIG__();
          if (!config && window.__MIXX_CONFIG__) config = window.__MIXX_CONFIG__;
        } catch (e) { /* fall through to fetch */ }

          try {
            var configRes = await fetch(assetUrl('runtime-config.json'), { cache: 'no-cache' });
            if (configRes.ok) config = await configRes.json();
          } catch (e2) { /* fall through */ }
        }
        var dataPath = (config && config.embeddedDataPath) || './data/project.json';
        var projectRes = await fetch(assetUrl(dataPath), { cache: 'no-cache' });
        if (!projectRes.ok) throw new Error('Project info/media data unavailable: ' + projectRes.status);
        return projectRes.json();
      }

      function text(value) {
        return String(value || '').trim();
      }

      function appendText(parent, tag, className, value) {
        var content = text(value);
        if (!content) return null;
        var el = document.createElement(tag);
        if (className) el.className = className;
        el.textContent = content;
        parent.appendChild(el);
        return el;
      }

      function safeMediaUrl(url, allowDataImage) {
        var raw = text(url);
        if (!raw) return '';
        try {
          var parsed = new URL(raw, document.baseURI);
          if (parsed.protocol === 'http:' || parsed.protocol === 'https:' || parsed.protocol === 'blob:') return parsed.href;

      function projectMeta(bundle) {
        return bundle.project || bundle.meta || bundle || {};
      }

      function mediaItems(bundle) {
        var byId = new Map();
        (Array.isArray(bundle.media) ? bundle.media : []).forEach(function(item) {
          if (item && item.id) byId.set(item.id, item);

        var infoItems = bundle.infoPage && bundle.infoPage.sections && bundle.infoPage.sections.media && Array.isArray(bundle.infoPage.sections.media.items)
          ? bundle.infoPage.sections.media.items
          : [];
        infoItems.forEach(function(item) {
          if (!item || !item.mediaId) return;
          if (byId.has(item.mediaId)) {
            var existing = byId.get(item.mediaId) || {};

              title: item.title || existing.title || existing.name,
              caption: item.caption || existing.caption || existing.description,
              type: item.type || existing.type,

        });
        return Array.from(byId.values()).filter(function(item) { return item && item.url; });
      }

      function renderMediaItem(item) {
        var card = document.createElement('article');
        card.className = 'mixx-project-media__item';
        card.setAttribute('data-media-id', text(item.id));
        card.setAttribute('data-media-type', text(item.type || 'media'));
        var mediaUrl = safeMediaUrl(item.url, /^image$/i.test(item.type || ''));

          var image = document.createElement('img');
          image.src = mediaUrl;
          image.alt = text(item.title || item.caption || 'Project media');
          image.loading = 'lazy';
          card.appendChild(image);
        }
        appendText(card, 'h3', 'mixx-project-media__title', item.title || item.name || item.id);
        appendText(card, 'p', 'mixx-project-media__caption', item.caption || item.description);

        var meta = projectMeta(bundle || {});
        var info = bundle.infoPage || {};
        var hero = info.hero || {};
        var sections = info.sections || {};
        var media = mediaItems(bundle || {});
        var hasThemes = sections.themes && sections.themes.enabled !== false && Array.isArray(sections.themes.items) && sections.themes.items.length;
        if (!hero.headline && !hero.thesis && !hero.locationLabel && !sections.context?.body && !hasThemes && !media.length) return;

        rendered = true;
        var surface = document.createElement('section');
        surface.className = 'mixx-project-info-media';
        surface.setAttribute('data-mixx-project-info-media', 'true');
        surface.setAttribute('aria-label', 'Project information and media');

        var infoPanel = document.createElement('article');
        infoPanel.className = 'mixx-project-info';
        infoPanel.setAttribute('data-mixx-project-info-panel', 'true');
        appendText(infoPanel, 'p', 'mixx-project-info__eyebrow', hero.locationLabel || meta.location || 'Project Information');
        appendText(infoPanel, 'h2', 'mixx-project-info__headline', hero.headline || meta.title || meta.name);
        appendText(infoPanel, 'p', 'mixx-project-info__thesis', hero.thesis || meta.description);
        appendText(infoPanel, 'p', 'mixx-project-info__context', sections.context && sections.context.enabled !== false ? sections.context.body : '');
        if (sections.whyItMatters && sections.whyItMatters.enabled !== false) {
          var whyText = sections.whyItMatters.body || (Array.isArray(sections.whyItMatters.bullets) ? sections.whyItMatters.bullets.filter(Boolean).join(' · ') : '');
          appendText(infoPanel, 'p', 'mixx-project-info__why', whyText);
        }
        if (sections.themes && sections.themes.enabled !== false && Array.isArray(sections.themes.items) && sections.themes.items.length) {
          var themes = document.createElement('div');
          themes.className = 'mixx-project-info__themes';
          themes.setAttribute('aria-label', 'Project themes');
          sections.themes.items.forEach(function(theme) {
            if (!theme) return;
            var themeCard = document.createElement('article');
            themeCard.className = 'mixx-project-info__theme';
            appendText(themeCard, 'h3', 'mixx-project-info__theme-title', theme.title || theme.label || theme.id);
            appendText(themeCard, 'p', 'mixx-project-info__theme-body', theme.body || theme.description);
            if (themeCard.childNodes.length) themes.appendChild(themeCard);
          });
          if (themes.childNodes.length) infoPanel.appendChild(themes);
        }
        appendText(infoPanel, 'p', 'mixx-project-info__explore', sections.howToExplore && sections.howToExplore.enabled !== false ? sections.howToExplore.body : '');
        if (Array.isArray(bundle.categories) && bundle.categories.length) {
          var chips = document.createElement('div');
          chips.className = 'mixx-project-info__categories';
          bundle.categories.forEach(function(category) {
            appendText(chips, 'span', 'mixx-project-info__category', category.name || category.label || category.id);
          });
          infoPanel.appendChild(chips);
        }
        surface.appendChild(infoPanel);

        if (media.length) {
          var mediaPanel = document.createElement('section');
          mediaPanel.className = 'mixx-project-media';
          mediaPanel.setAttribute('aria-label', 'Project media resources');
          appendText(mediaPanel, 'h2', 'mixx-project-media__heading', 'Project media');
          var grid = document.createElement('div');
          grid.className = 'mixx-project-media__grid';
          media.forEach(function(item) { grid.appendChild(renderMediaItem(item)); });
          mediaPanel.appendChild(grid);
          surface.appendChild(mediaPanel);
        }

        var target = document.querySelector('main, [data-testid="landing-page"], #app') || document.body;
        if (target === document.body) target.appendChild(surface); else target.insertAdjacentElement('afterend', surface);
        window.dispatchEvent(new CustomEvent('mixx:info-media-ready', { detail: { mediaCount: media.length } }));
      }

      async function scheduleInfoMedia(reason) {
        if (!isLandingPath() || rendered) return;
        try {
          renderInfoMediaSurface(await loadProjectBundle(), reason);
        } catch (error) {
          console.warn('[Mixx] Info/media bridge failed:', error && error.message ? error.message : error);
        }
      }

      document.addEventListener('DOMContentLoaded', function() { setTimeout(function() { scheduleInfoMedia('dom-ready'); }, 1000); });
      window.addEventListener('load', function() { setTimeout(function() { scheduleInfoMedia('load'); }, 1500); });

    })();
  </script>

  <!-- Export live-view bridge: generated/static packages must show a spatial view on /app even when bundled viewer boot misses the route. -->
  <script data-mixx-export-live-view-bridge>
    (function() {
      var LIVE_SELECTOR = 'canvas, .leaflet-container, .cesium-widget, .cesium-viewer, [data-mixx-live-view], [data-testid="live-view"], [data-testid="spatial-view"]';
      var rendered = false;

      function isAppPath() {
        return /(?:^|\/)app\/?$/.test(window.location.pathname || '');
      }

      function visible(el) {
        if (!el) return false;
        var rect = el.getBoundingClientRect && el.getBoundingClientRect();
        var style = window.getComputedStyle ? window.getComputedStyle(el) : null;
        return !!rect && rect.width >= 120 && rect.height >= 120 && (!style || (style.display !== 'none' && style.visibility !== 'hidden' && style.opacity !== '0'));
      }

      function hasVisibleLiveView() {
        return Array.prototype.some.call(document.querySelectorAll(LIVE_SELECTOR), visible);
      }

      function assetUrl(path) {
        var base = document.querySelector('link[rel="manifest"]');
        var href = base && base.href ? base.href.replace(/manifest\.json(?:\?.*)?$/, '') : document.baseURI;
        return new URL(path.replace(/^\.\//, ''), href).href;
      }

      async function loadProjectData() {
        var config = null;
        try {
          if (window.__MIXX_CONFIG_READY__) config = await window.__MIXX_CONFIG_READY__;
          if (!config && window.__MIXX_GET_CONFIG__) config = window.__MIXX_GET_CONFIG__();
          if (!config && window.__MIXX_CONFIG__) config = window.__MIXX_CONFIG__;
        } catch (e) { /* fall through to fetch */ }

        if (!config) {
          try {
            var configRes = await fetch(assetUrl('runtime-config.json'), { cache: 'no-cache' });
            if (configRes.ok) config = await configRes.json();
          } catch (e2) { /* fall through */ }
        }

        var dataPath = (config && config.embeddedDataPath) || './data/project.json';
        var projectRes = await fetch(assetUrl(dataPath), { cache: 'no-cache' });
        if (!projectRes.ok) throw new Error('Project data unavailable for live view: ' + projectRes.status);
        return projectRes.json();
      }

      function normalizeProject(bundle) {
        var root = bundle || {};
        return {
          title: (root.project && (root.project.title || root.project.name)) || root.title || 'Mixx Experience',
          description: (root.project && root.project.description) || root.description || '',
          pois: Array.isArray(root.pois) ? root.pois : [],
          phases: Array.isArray(root.phases) ? root.phases : [],
          categories: Array.isArray(root.categories) ? root.categories : []
        };
      }

      function pointForPoi(poi) {
        var lat = Number(poi.lat ?? poi.latitude ?? (poi.location && poi.location.lat));
        var lon = Number(poi.lon ?? poi.lng ?? poi.longitude ?? (poi.location && (poi.location.lon || poi.location.lng)));
        return Number.isFinite(lat) && Number.isFinite(lon) ? { lat: lat, lon: lon } : null;
      }

      function drawCanvas(canvas, project, activePoiId) {

        var dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

        canvas.height = Math.floor(height * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        var gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, '#061223');
        gradient.addColorStop(0.55, '#0d2c48');
        gradient.addColorStop(1, '#123b33');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        ctx.strokeStyle = 'rgba(130,255,220,0.18)';
        ctx.lineWidth = 1;
        for (var x = -height; x < width + height; x += 46) {
          ctx.beginPath(); ctx.moveTo(x, height); ctx.lineTo(x + height, 0); ctx.stroke();
        }
        var points = project.pois.map(function(poi) { return { poi: poi, point: pointForPoi(poi) }; }).filter(function(item) { return item.point; });
        if (!points.length) {
          ctx.fillStyle = 'rgba(248,250,252,0.86)';
          ctx.font = '600 18px system-ui, sans-serif';
          ctx.fillText('Spatial view ready', 24, 44);
          return;
        }
        var lats = points.map(function(item) { return item.point.lat; });
        var lons = points.map(function(item) { return item.point.lon; });
        var minLat = Math.min.apply(Math, lats), maxLat = Math.max.apply(Math, lats);
        var minLon = Math.min.apply(Math, lons), maxLon = Math.max.apply(Math, lons);
        var pad = 54;
        function sx(lon) { return pad + ((lon - minLon) / (maxLon - minLon || 1)) * (width - pad * 2); }
        function sy(lat) { return height - pad - ((lat - minLat) / (maxLat - minLat || 1)) * (height - pad * 2); }
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(90,139,255,0.62)';
        ctx.beginPath();
        points.forEach(function(item, index) {
          var x = sx(item.point.lon), y = sy(item.point.lat);
          if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();
        points.forEach(function(item, index) {
          var x = sx(item.point.lon), y = sy(item.point.lat);
          var active = activePoiId === item.poi.id;
          ctx.beginPath();
          ctx.fillStyle = active ? '#82ffdc' : '#5a8bff';
          ctx.strokeStyle = active ? 'rgba(130,255,220,0.95)' : 'rgba(255,255,255,0.72)';
          ctx.lineWidth = active ? 5 : 3;
          ctx.arc(x, y, active ? 13 : 10, 0, Math.PI * 2);
          ctx.fill(); ctx.stroke();
          ctx.fillStyle = 'rgba(248,250,252,0.95)';
          ctx.font = '700 12px system-ui, sans-serif';
          ctx.fillText(String(index + 1), x - 4, y + 4);
        });
      }

      async function renderLiveView(reason) {
        if (rendered || !isAppPath() || hasVisibleLiveView()) return;
        rendered = true;
        var app = document.getElementById('app');
        if (!app) return;
        try {
          var project = normalizeProject(await loadProjectData());
          var activePoiId = project.pois[0] && project.pois[0].id;
          app.innerHTML = '';
          var shell = document.createElement('main');
          shell.className = 'mixx-live-view';
          shell.setAttribute('data-mixx-live-view', 'true');
          shell.setAttribute('data-render-reason', reason || 'fallback');
          shell.innerHTML = '<section class="mixx-live-view__stage" aria-label="Live spatial map"><canvas data-mixx-live-view-canvas role="img" aria-label="Spatial map of published project points"></canvas></section><aside class="mixx-live-view__panel"><p class="mixx-live-view__eyebrow">Live spatial view</p><h1></h1><p class="mixx-live-view__description"></p><div class="mixx-live-view__pois" aria-label="Published points of interest"></div></aside>';
          app.appendChild(shell);
          shell.querySelector('h1').textContent = project.title;
          shell.querySelector('.mixx-live-view__description').textContent = project.description || 'Explore the published spatial experience.';
          var list = shell.querySelector('.mixx-live-view__pois');
          project.pois.forEach(function(poi, index) {
            var button = document.createElement('button');
            button.type = 'button';
            button.className = 'mixx-live-view__poi';
            button.textContent = (index + 1) + '. ' + (poi.title || poi.name || poi.id || 'Point of interest');
            button.setAttribute('data-poi-id', poi.id || 'poi-' + index);
            button.addEventListener('click', function() {
              activePoiId = poi.id;
              window.dispatchEvent(new CustomEvent('mixx:poi-highlight', { detail: { poiId: poi.id } }));
              Array.prototype.forEach.call(list.querySelectorAll('button'), function(el) { el.setAttribute('aria-pressed', 'false'); });
              button.setAttribute('aria-pressed', 'true');
              drawCanvas(shell.querySelector('canvas'), project, activePoiId);
            });
            if (index === 0) button.setAttribute('aria-pressed', 'true');
            list.appendChild(button);
          });
          var canvas = shell.querySelector('canvas');
          drawCanvas(canvas, project, activePoiId);
          window.addEventListener('resize', function() { drawCanvas(canvas, project, activePoiId); });
          window.dispatchEvent(new CustomEvent('mixx:live-view-ready', { detail: { source: 'export-bridge', poiCount: project.pois.length } }));
        } catch (error) {
          rendered = false;
          console.warn('[Mixx] Live view bridge failed:', error && error.message ? error.message : error);
        }
      }

      function schedule(reason) {
        if (!isAppPath()) return;
        setTimeout(function() { renderLiveView(reason); }, 900);
        setTimeout(function() { renderLiveView(reason + '-late'); }, 1800);
      }

      function navigateToApp() {
        if (!isAppPath()) {
          history.pushState({}, '', new URL('./app', document.baseURI).pathname);
          window.dispatchEvent(new PopStateEvent('popstate'));
        }
        schedule('launch');
      }

      document.addEventListener('click', function(event) {
        var button = event.target && event.target.closest && event.target.closest('button, a');
        if (!button) return;
        var text = (button.textContent || '').trim();
        var href = button.getAttribute && button.getAttribute('href');
        if (/Enter the Spatial Experience|Launch Experience|Start Experience/i.test(text) || /\/app\/?$/.test(href || '')) {
          setTimeout(navigateToApp, 0);
        }
      }, true);

      window.addEventListener('popstate', function() { schedule('popstate'); });
      document.addEventListener('DOMContentLoaded', function() { schedule('dom-ready'); });
      window.addEventListener('load', function() { schedule('load'); });
    })();
